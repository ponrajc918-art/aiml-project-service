<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --bg2: #0e0e1a;
    --card: #11111f;
    --card2: #161628;
    --border: rgba(255,255,255,0.07);
    --blue: #3b6ef5;
    --blue-light: #5b89ff;
    --blue-glow: rgba(59,110,245,0.25);
    --blue-glow2: rgba(59,110,245,0.12);
    --text: #f0f0f8;
    --muted: #8888aa;
    --muted2: #5a5a7a;
    --success: #22c55e;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

  ::selection { background: rgba(59,110,245,0.3); color: #fff; }

  /* ── GRID BACKGROUND ── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,110,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,110,245,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
  }

  /* ── BLUR ORBS ── */
  .orb {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(80px); opacity: 0.35;
  }
  .orb-1 { width: 500px; height: 500px; background: #1a3aff; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: 10%; right: -80px; }
  .orb-3 { width: 300px; height: 300px; background: #002eb3; top: 45%; left: 40%; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    background: rgba(8,8,16,0.8);
    border-bottom: 1px solid var(--border);
    padding: 0 max(24px, calc(50% - 600px));
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: var(--font-head); font-weight: 800; font-size: 1.15rem;
    color: #fff; letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--blue); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.88rem;
    font-weight: 500; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--blue); color: #fff; border: none; cursor: pointer;
    padding: 8px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600;
    font-family: var(--font-body); transition: all 0.2s; white-space: nowrap;
  }
  .nav-cta:hover { background: var(--blue-light); transform: translateY(-1px); }

  @media(max-width:640px) { .nav-links { display: none; } }

  /* ── SECTION BASE ── */
  section { position: relative; z-index: 1; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section-label {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2);
    color: var(--blue-light); padding: 6px 14px; border-radius: 100px;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 20px;
  }
  .section-label::before { content:''; width:6px; height:6px; background:var(--blue-light); border-radius:50%; }
  .section-title {
    font-family: var(--font-head); font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.1;
    letter-spacing: -0.03em; color: #fff;
  }
  .section-sub { color: var(--muted); font-size: 1.05rem; margin-top: 12px; max-width: 520px; line-height: 1.7; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 120px 0 80px;
  }
  .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  @media(max-width:900px) { .hero-inner { grid-template-columns: 1fr; gap: 48px; } }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2);
    color: var(--blue-light); padding: 7px 16px; border-radius: 100px;
    font-size: 0.8rem; font-weight: 600; margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }
  .hero-badge-dot { width:7px; height:7px; background:var(--success); border-radius:50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

  .hero-h1 {
    font-family: var(--font-head); font-weight: 800;
    font-size: clamp(2.8rem, 6vw, 4.8rem); line-height: 1.0;
    letter-spacing: -0.04em; color: #fff;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .hero-h1 .accent {
    background: linear-gradient(135deg, var(--blue-light), #8aa8ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-sub {
    margin-top: 20px; color: var(--muted); font-size: 1.15rem; line-height: 1.7; max-width: 480px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .hero-actions {
    display: flex; gap: 14px; margin-top: 36px; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    background: var(--blue); color: #fff; border: none; cursor: pointer;
    padding: 14px 28px; border-radius: 10px; font-size: 1rem; font-weight: 600;
    font-family: var(--font-body); transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 0 30px var(--blue-glow);
  }
  .btn-primary:hover { background: var(--blue-light); transform: translateY(-2px); box-shadow: 0 6px 40px var(--blue-glow); }
  .btn-secondary {
    background: transparent; color: var(--text); border: 1px solid var(--border);
    cursor: pointer; padding: 14px 28px; border-radius: 10px; font-size: 1rem; font-weight: 500;
    font-family: var(--font-body); transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { border-color: rgba(59,110,245,0.4); background: var(--blue-glow2); }

  .hero-stats {
    display: flex; gap: 32px; margin-top: 52px; padding-top: 36px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .stat-num { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; color: #fff; }
  .stat-num span { color: var(--blue-light); }
  .stat-label { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

  /* HERO RIGHT – floating card */
  .hero-visual {
    position: relative; animation: fadeUp 0.8s 0.2s ease both;
  }
  .hero-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 28px; position: relative; overflow: hidden;
  }
  .hero-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
  }
  .hero-card-title { font-family: var(--font-head); font-weight: 700; font-size: 1rem; color: #fff; margin-bottom: 16px; }
  .code-block {
    background: #070710; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.8;
  }
  .c-kw { color: #7c9aff; }
  .c-fn { color: #82e0ff; }
  .c-str { color: #a8d8a8; }
  .c-cm { color: var(--muted2); }
  .c-num { color: #ffb347; }
  .hero-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .hero-tag {
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2);
    color: var(--blue-light); padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 500;
  }
  .floating-chip {
    position: absolute; background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 500; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .chip-1 { top: -20px; right: -20px; animation-delay: 0s; }
  .chip-2 { bottom: -20px; left: -20px; animation-delay: 2s; }
  .chip-dot { width:8px; height:8px; border-radius:50%; }

  @media(max-width:900px) { .hero-visual { display:none; } }

  /* ── CATEGORIES ── */
  #categories { padding: 100px 0; }
  .cards-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 56px; }
  @media(max-width:900px) { .cards-grid { grid-template-columns: 1fr; } }
  @media(min-width:640px) and (max-width:900px) { .cards-grid { grid-template-columns: repeat(2,1fr); } }

  .proj-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px; position: relative; overflow: hidden; cursor: pointer;
    transition: all 0.3s ease; display: flex; flex-direction: column;
  }
  .proj-card::before {
    content:''; position:absolute; inset:0; border-radius:20px;
    background: linear-gradient(135deg, var(--blue-glow2) 0%, transparent 60%);
    opacity:0; transition: opacity 0.3s;
  }
  .proj-card:hover { border-color: rgba(59,110,245,0.35); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .proj-card:hover::before { opacity:1; }
  .proj-card.selected { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 20px 60px rgba(0,0,0,0.4); }
  .proj-card.featured { border-color: rgba(59,110,245,0.3); }

  .featured-badge {
    position: absolute; top: 20px; right: 20px;
    background: var(--blue); color: #fff; font-size: 0.7rem; font-weight: 700;
    padding: 4px 10px; border-radius: 6px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .card-icon {
    width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px; font-size: 1.5rem;
  }
  .icon-green { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.2); }
  .icon-blue { background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2); }
  .icon-purple { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); }

  .card-tier { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
  .card-name { font-family: var(--font-head); font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .card-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; flex:1; }
  .card-features { list-style: none; margin-bottom: 28px; display: flex; flex-direction: column; gap: 8px; }
  .card-features li { display: flex; align-items: center; gap: 10px; font-size: 0.875rem; color: var(--muted); }
  .check-icon { width:18px; height:18px; background:rgba(59,110,245,0.15); border:1px solid rgba(59,110,245,0.25); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .check-icon svg { width:10px; height:10px; }
  .card-btn {
    width: 100%; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    font-family: var(--font-body); cursor: pointer; transition: all 0.2s; border: none;
  }
  .card-btn-primary { background: var(--blue); color: #fff; }
  .card-btn-primary:hover { background: var(--blue-light); }
  .card-btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .card-btn-outline:hover { border-color: rgba(59,110,245,0.4); background: var(--blue-glow2); color: #fff; }

  /* ── DEMOS ── */
  #demos { padding: 100px 0; }
  .demos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 56px; }
  @media(max-width:900px) { .demos-grid { grid-template-columns:1fr; } }
  @media(min-width:640px) and (max-width:900px) { .demos-grid { grid-template-columns:repeat(2,1fr); } }

  .demo-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    overflow: hidden; transition: all 0.3s;
  }
  .demo-card:hover { transform: translateY(-4px); border-color: rgba(59,110,245,0.3); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .demo-preview {
    height: 200px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .demo-bg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .demo-mockup {
    width: 90%; height: 85%; background: var(--bg2); border-radius: 8px;
    border: 1px solid var(--border); overflow: hidden; position: relative;
  }
  .demo-bar { height: 24px; background: var(--card2); border-bottom: 1px solid var(--border); display:flex; align-items:center; padding: 0 10px; gap:6px; }
  .demo-dot { width:7px; height:7px; border-radius:50%; }
  .demo-content { padding: 12px; }
  .demo-chart-line { height:3px; border-radius:2px; margin:6px 0; }
  .demo-chart-bars { display:flex; align-items:flex-end; gap:4px; height:50px; margin-top:10px; }
  .demo-bar-item { flex:1; border-radius:3px 3px 0 0; min-height:8px; }

  .demo-info { padding: 24px; }
  .demo-tag {
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2);
    color: var(--blue-light); padding: 3px 10px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; display:inline-block; margin-bottom:12px;
  }
  .demo-title { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .demo-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 16px; }
  .demo-links { display: flex; gap: 10px; }
  .demo-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.82rem; font-weight: 600; text-decoration: none;
    padding: 7px 14px; border-radius: 8px; transition: all 0.2s; cursor: pointer; border: none;
    font-family: var(--font-body);
  }
  .demo-link-github { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .demo-link-github:hover { border-color: rgba(59,110,245,0.3); color:#fff; }
  .demo-link-live { background: var(--blue); color: #fff; }
  .demo-link-live:hover { background: var(--blue-light); }

  /* ── FORM ── */
  #form-section { padding: 100px 0; }
  .form-wrapper {
    max-width: 640px; margin: 0 auto; margin-top: 56px;
    background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px;
    position: relative; overflow: hidden;
  }
  .form-wrapper::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
  }
  @media(max-width:640px) { .form-wrapper { padding: 28px 20px; } }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:540px) { .form-grid { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 0.82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 13px 16px; border-radius: 10px; font-size: 0.95rem; font-family: var(--font-body);
    transition: all 0.2s; outline: none; width: 100%; -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow2); }
  .field input::placeholder { color: var(--muted2); }
  .field select option { background: #0e0e1a; }

  .field input.error { border-color: #ef4444; }
  .field-err { color: #ef4444; font-size: 0.78rem; margin-top: 2px; }

  .phone-row { display: flex; gap: 10px; }
  .phone-row input { flex: 1; }
  .otp-btn {
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.3); color: var(--blue-light);
    padding: 0 16px; border-radius: 10px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; font-family: var(--font-body); transition: all 0.2s; white-space: nowrap;
  }
  .otp-btn:hover { background: rgba(59,110,245,0.2); }
  .otp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .otp-field { position: relative; }
  .otp-verified { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--success); display: flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 600; }

  .selected-type {
    background: var(--blue-glow2); border: 1px solid rgba(59,110,245,0.2);
    padding: 12px 16px; border-radius: 10px; color: var(--blue-light); font-weight: 600; font-size: 0.95rem;
  }

  .submit-btn {
    width: 100%; margin-top: 28px; padding: 15px; border-radius: 12px;
    background: var(--blue); color: #fff; font-size: 1rem; font-weight: 700;
    font-family: var(--font-head); border: none; cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 0 30px var(--blue-glow);
  }
  .submit-btn:hover { background: var(--blue-light); transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── SUCCESS ── */
  .success-overlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(8,8,16,0.95);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(20px);
    animation: fadeIn 0.3s ease;
  }
  .success-box {
    text-align: center; padding: 60px 40px; max-width: 440px;
    animation: scaleIn 0.4s 0.1s ease both;
  }
  .success-icon {
    width: 80px; height: 80px; border-radius: 50%; background: rgba(34,197,94,0.15);
    border: 2px solid rgba(34,197,94,0.3); display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px; font-size: 2rem;
  }
  .success-box h2 { font-family: var(--font-head); font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
  .success-box p { color: var(--muted); line-height: 1.7; }
  .redirect-bar { margin-top: 28px; background: var(--card2); border-radius: 8px; overflow: hidden; height: 4px; }
  .redirect-fill { height: 100%; background: var(--blue); animation: fill 3s linear forwards; }
  @keyframes fill { from{width:0%} to{width:100%} }

  /* ── STICKY CTA ── */
  .sticky-cta {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 50; display: none;
    background: var(--blue); color: #fff; border: none; cursor: pointer;
    padding: 14px 32px; border-radius: 100px; font-size: 0.95rem; font-weight: 700;
    font-family: var(--font-body); box-shadow: 0 8px 30px var(--blue-glow);
    animation: slideUp 0.5s ease both; white-space: nowrap;
  }

/* ─── USE INTERSECTION OBSERVER ─── */
function useReveal(ref) {
  useEffect(() => {
    if (!ref.current) return;
    const els = ref.current.querySelectorAll('.animate-up');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

                <div className="field full">
                  <label>Phone Verification</label>
                  <div style={{display:'flex', alignItems:'center', gap:'8px', color:'#22c55e', fontSize:'0.9rem', fontWeight:600, padding:'12px 0'}}>
                    <span>✓</span> Phone verified successfully
                  </div>
                </div>
              )}

              {/* College */}
              <div className="field full">
                <label>College Name *</label>
                <input
                  type="text" placeholder="e.g. Anna University, Chennai"
                  className={errors.college?'error':''}
                  value={form.college}
                  onChange={e=>setForm(f=>({...f,college:e.target.value}))}
                />
                {errors.college && <span className="field-err">{errors.college}</span>}
              </div>

              {/* Dept */}
              <div className="field">
                <label>Department *</label>
                <select
                  className={errors.dept?'error':''}
                  value={form.dept}
                  onChange={e=>setForm(f=>({...f,dept:e.target.value}))}
                >
                  <option value="">Select department</option>
                  {depts.map(d=><option key={d}>{d}</option>)}
                </select>
                {errors.dept && <span className="field-err">{errors.dept}</span>}
              </div>

              {/* Year */}
              <div className="field">
                <label>Year of Study *</label>
                <select
                  className={errors.year?'error':''}
                  value={form.year}
                  onChange={e=>setForm(f=>({...f,year:e.target.value}))}
                >
                  <option value="">Select year</option>
                  <option value="1st">1st Year</option>
                  <option value="2nd">2nd Year</option>
                  <option value="3rd">3rd Year</option>
                  <option value="4th">4th Year (Final Year)</option>
                </select>
                {errors.year && <span className="field-err">{errors.year}</span>}
              </div>

              {/* Project Type */}
              <div className="field full">
                <label>Selected Project Type</label>
                {selected
                  ? <div className="selected-type">✓ {selected} — AI/ML Project</div>
                  : <div style={{color:'var(--muted2)', fontSize:'0.9rem', padding:'12px 0'}}>
                      No project selected. <a href="#categories" style={{color:'var(--blue-light)', textDecoration:'none'}} onClick={e=>{e.preventDefault(); document.getElementById('categories').scrollIntoView({behavior:'smooth'})}}>Pick one above ↑</a>
                    </div>
                }
                {errors.type && <span className="field-err">{errors.type}</span>}
              </div>
            </div>

            <button className="submit-btn" onClick={handleSubmit} disabled={submitting}>
              {submitting ? (
                <><span style={{animation:'spin 1s linear infinite', display:'inline-block'}}>⟳</span> Processing…</>
              ) : (
                <><IconWhatsApp/> Send via WhatsApp</>
              )}
            </button>

            <p style={{textAlign:'center', color:'var(--muted2)', fontSize:'0.8rem', marginTop:'16px', lineHeight:'1.6'}}>
              By submitting, you agree to be contacted via WhatsApp. Your data is safe with us.
            </p>
          </div>
        </div>
      </section>

      {/* ─── FOOTER ─── */}
      <footer>
        <p>© 2025 <strong style={{color:'var(--text)'}}>FYPStudio</strong>. Built for students. Reach us on <a href="https://wa.me/919677690323">WhatsApp</a>.</p>
      </footer>

      {/* ─── STICKY CTA ─── */}
      <button className="sticky-cta" onClick={scrollToForm}>
        Get Your Project →
      </button>

      {/* ─── SUCCESS OVERLAY ─── */}
      {showSuccess && (
        <div className="success-overlay">
          <div className="success-box">
            <div className="success-icon">✓</div>
            <h2>You're all set!</h2>
            <p>Redirecting you to WhatsApp to complete your project request. We'll get back to you within a few hours.</p>
            <div className="redirect-bar"><div className="redirect-fill"></div></div>
          </div>
        </div>
      )}

      {/* ─── TOAST ─── */}
      {toast && <Toast key={toast.id} message={toast.message} type={toast.type} onDone={()=>setToast(null)}/>}

      <style>{`
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        #categories { scroll-margin-top: 80px; }
        #demos { scroll-margin-top: 80px; }
        #form-section { scroll-margin-top: 80px; }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
